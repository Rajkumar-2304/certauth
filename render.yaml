services:
  - type: web
    name: certauth-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    envVars:
      - key: PORT
        value: 5000
      - key: MONGODB_URI
        sync: false       # Set manually in Render dashboard (secret)
      - key: JWT_SECRET
        sync: false       # Set manually in Render dashboard (secret)
      - key: JWT_EXPIRE
        value: 7d
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false       # Set manually in Render dashboard (secret)
      - key: EMAIL_PASS
        sync: false       # Set manually in Render dashboard (secret)
      - key: CLIENT_URL
        sync: false       # Set manually in Render dashboard (your Netlify URL)
